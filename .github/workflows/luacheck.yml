name: Lua Lint (luacheck)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lua and luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck on all NSE scripts
        run: |
          luacheck HTTP DNS SMB SSL-TLS DATABASE FTP \
            --globals nmap stdnse shortport \
            --no-max-line-length \
            --codes
        continue-on-error: false
